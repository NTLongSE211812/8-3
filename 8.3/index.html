<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà nè</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --glass: rgba(45, 45, 45, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff85a2;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2c3e50 0%, #000 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        #particles {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .container {
            width: 350px;
            height: 620px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Màn hình khóa */
        .lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
            background: url('https://i.postimg.cc/Bbjr5K63/hanh.jpg') center/cover;
        }

        .pin-dots { display: flex; gap: 12px; margin: 25px 0; }
        .dot { width: 12px; height: 12px; border: 1.5px solid var(--accent); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .keypad button {
            width: 60px; height: 60px; border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white; font-size: 1.2rem; cursor: pointer;
        }
        .keypad button:active { background: var(--accent); transform: scale(0.9); }

        /* Màn hình chính */
        #main-content {
            display: none;
            opacity: 0;
            height: 100%;
            flex-direction: column;
            text-align: center;
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--accent);
            margin-top: 30px;
        }

        /* Ô Thư Tay */
        .letter-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Slider ảnh chạy ngang */
        .photo-slider-container {
    margin-top: 20px;
    margin-bottom: 30px;
}

        .slider-track {
            display: flex;
            width: calc(230px * 8); /* Điều chỉnh dựa trên số ảnh x chiều rộng */
            animation: scroll 20s linear infinite;
        }

        .slider-track img {
    width: 200px;
    height: 260px;
    object-fit: cover;
    border-radius: 20px;
    margin: 0 15px;
    border: 1px solid var(--glass-border);
}

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-230px * 4)); } /* Chạy qua 4 ảnh rồi lặp lại */
        }

        /* Modal */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            z-index: 100;
            display: none;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 40px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .close-btn { color: var(--accent); font-size: 1.5rem; cursor: pointer; float: right; }
.author-name {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 10px;
    text-align: center;
}
.special-gift-text {
    font-family: 'Dancing Script', cursive;
    font-size: 2.2rem;
    color: #ff4d6d;
    text-shadow: 0 0 10px rgba(255, 77, 109, 0.5), 2px 2px 4px rgba(0, 0, 0, 0.3);
    margin-bottom: 15px;
    font-weight: 700;
    animation: heartBeat 2s infinite;
}
.author-name {
    position: fixed;
    bottom: 15px;
    right: 20px;
    font-size: 11px;
    opacity: 0.6;
}
@keyframes heartBeat {
    0% { transform: scale(1); }
    14% { transform: scale(1.1); }
    28% { transform: scale(1); }
    42% { transform: scale(1.1); }
    70% { transform: scale(1); }
}
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="container">
        <div class="lock-screen" id="lock-screen">

    <div class="special-gift-text">8/3 Gift</div>
            <div class="avatar"></div>
            <p style="font-size: 0.8rem; letter-spacing: 1px;">NHẬP MÃ PIN</p>
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="keypad">
                <button onclick="addPin('1')">1</button><button onclick="addPin('2')">2</button><button onclick="addPin('3')">3</button>
                <button onclick="addPin('4')">4</button><button onclick="addPin('5')">5</button><button onclick="addPin('6')">6</button>
                <button onclick="addPin('7')">7</button><button onclick="addPin('8')">8</button><button onclick="addPin('9')">9</button>
                <button onclick="resetPin()">C</button><button onclick="addPin('0')">0</button><button onclick="resetPin()">⌫</button>
            </div>
        </div>

        <div id="main-content">
            <div class="title">ai đây...</div>
            
            <div class="letter-box" onclick="openLetter()">
                <span style="font-size: 1.5rem;">✉️</span>
                <p style="font-size: 0.8rem; margin: 5px 0 0;">Vài lời</p>
            </div>

                     
            <div class="photo-slider-container">
                <div class="slider-track">
                    <img src="https://i.postimg.cc/Y0v5NWSZ/ay-da.jpg">
                    <img src="https://i.postimg.cc/MHnC0QTJ/bleble.png">
                    <img src="https://i.postimg.cc/vTCp0Zgq/hanh-tot-nghiep.jpg">
                    <img src="https://i.postimg.cc/D0RtxwJB/mom-nao-a.jpg">
                    <img src="https://i.postimg.cc/MHgh9pM9/photobook.png">
                    <img src="https://i.postimg.cc/6q8kVv3X/Screenshot-2026-03-03-192917.png">
                    <img src="https://i.postimg.cc/yx2wL8gf/Screenshot-2026-03-03-194054.png">
                    <img src="https://i.postimg.cc/qqNPc3Rf/wtf.jpg">
                </div>
            </div>
        </div>
<div class="author-name">MADE BY anh L giấu tên</div>
        <div class="modal" id="letter-modal">
            <span class="close-btn" onclick="closeLetter()">×</span>
            <div style="margin-top: 50px;">
                <h3 style="font-family: 'Dancing Script'; font-size: 1.8rem; color: var(--accent);">Vài lời...,</h3>
                <p style="font-family: 'Inter'; line-height: 1.8; font-size: 0.9rem;">
                   8/3 vui vẻ nhen,không bớt xàm lol lại,có nhậu nhớ rủ...❤️
                </p>
            </div>
        </div>
    </div>
    <script>
        let pin = "";
        const targetPin = "0803"; // THAY MẬT KHẨU TẠI ĐÂY

        function addPin(num) {
            if (pin.length < 4) {
                pin += num;
                updateDots();
                if (pin.length === 4) {
                    setTimeout(() => {
                        if (pin === targetPin) unlock();
                        else { alert("Sai mã rồi nè!"); resetPin(); }
                    }, 200);
                }
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i < pin.length));
        }

        function resetPin() { pin = ""; updateDots(); }

        function unlock() {
    const music = document.getElementById("unlock-music");

    music.play().catch(error => {
        console.log("Audio lỗi:", error);
    });

    document.getElementById("lock-screen").style.display = "none";
    const main = document.getElementById("main-content");
    main.style.display = "flex";

    setTimeout(() => {
        main.style.opacity = "1";
    }, 100);
}
           
        function openLetter() { document.getElementById('letter-modal').style.display = 'block'; }
        function closeLetter() { document.getElementById('letter-modal').style.display = 'none'; }

        // Hiệu ứng tim bay
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '100px';
            heart.style.opacity = '0.3';
            heart.style.zIndex = '0';
            heart.style.transition = 'transform 6s linear, opacity 6s';
            document.getElementById('particles').appendChild(heart);
            setTimeout(() => {
                heart.style.transform = `translateY(-110vh)`;
                heart.style.opacity = '0';
            }, 100);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 800);
    </script>
<audio id="unlock-music" src="https://files.catbox.moe/8kdhsg.mp3" preload="auto"></audio></body>
</html>
